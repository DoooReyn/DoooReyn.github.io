<!DOCTYPE html>

<head>微读自动阅读器</head>
<script language="javascript">
    function favorite() {
        window.external.addFavorite(`javascript:alert("0")`, "微读自动阅读器");
    }
</script>

<body onload="favorite()" />

</html>

<head>
    <script type="text/javascript">
        function AddToFavorites() {
            if (window.sidebar) { // Firefox
                window.sidebar.addPanel('微读自动阅读器', 'https://baidu.com', '');
            } else {
                if (window.external && ('AddFavorite' in window.external)) {
                    // Internet Explorer
                    window.external.AddFavorite('https://baidu.com', '微读自动阅读器');
                } else { // Opera, Google Chrome and Safari
                    alert("Your browser doesn't support this example!");
                }
            }
        }
    </script>
</head>

<body>
    <button onclick="AddToFavorites ();">Add to favorites</button>
</body>
